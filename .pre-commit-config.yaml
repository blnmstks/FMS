repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff         # lint + autofix
      - id: ruff-format  # format (like black)

  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest (unit)
        entry: pytest tests/unit/
        language: system
        pass_filenames: false
        always_run: true
